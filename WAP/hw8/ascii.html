<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' type='text/css' media='screen' href='ascii.css'>
    <script src='ascii.js'></script>
    <script src='animations.js'></script>
    <title>ASCIImation</title>
</head>

<body>
    <h1>CS472: ASCII Animation Viewer</h1>
    <textarea id="textArea" cols="80" rows="20"></textarea> <br />
    <fieldset>
        <legend>Play Controls:</legend>
        <button id="start">Start</button>
        <button id="stop">Stop</button>
    </fieldset>
    <fieldset>
        <legend>Animation:</legend>
        <select id="animation">
            <option value="Blank">Blank</option>
            <option value="Exercise">Exercise</option>
            <option value="Juggler">Juggler</option>
            <option value="Bike">Bike</option>
            <option value="Dive">Dive</option>
            <option value="Custom">Custom</option>
        </select>
    </fieldset>
    <fieldset>
        <legend>Size:</legend>
        <select id="size">
            <option value="7pt">Tiny</option>
            <option value="10pt">Small</option>
            <option value="12pt" selected>Medium</option>
            <option value="16pt">Large</option>
            <option value="24pt">Extra Large</option>
            <option value="32pt">XXL</option>
        </select>
    </fieldset>
    <fieldset>
        <legend>Speed:</legend>
        <input type="checkbox" id="speed" name="speed" value="turbo"><label>Turbo</label>
    </fieldset>
    <div class="html-checker">
        <a href="https://validator.w3.org/nu/?doc=https://ochirtulga.github.io/hw8/ascii.html"> <img class="all-images"
                src="../images/w3c-html.png" alt="Valid HTML5" /></a>
        <a href="https://jigsaw.w3.org/css-validator/validator?uri=ochirtulga.github.io/hw8/ascii.css"><img
                class="all-images" src="../images/w3c-css.png" alt="Valid CSS" /></a>
        <a href="http://mumstudents.org/jscheck/check.php?uri=https://ochirtulga.github.io/hw8/ascii.js"><img
                src="../images/jscheck-small.png" alt="Valid JS" />
        </a>
    </div>
</body>

</html>
