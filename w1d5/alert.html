<!DOCTYPE html>
<html lang="en">
    <script>
        function myFunction() {
            alert("You Clicked Me");
        }
    </script>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnClick Alert</title>
</head>
<body>
    <button onclick="myFunction();">Click Me</button>
</body>
</html>
